      <div class="container cat-strip-inner" style="padding:0;" id="catalogTabs"></div>
    </div>

    <div class="products-grid" id="productsGrid"></div>
  </div>
</section>

<!-- ═══════ SERVICES ═══════ -->
<section class="section" id="services">
  <div class="container">
    <div class="section-header center reveal">
      <div class="section-label" id="servicesLabel"></div>
      <h2 class="section-title" id="servicesTitle"></h2>
      <p class="section-desc" id="servicesDesc"></p>
    </div>
    <div class="services-grid" id="servicesGrid"></div>
  </div>
</section>

<!-- ═══════ PARTNERS ═══════ -->
<section class="section section-gray" id="partners">
  <div class="container">
    <div class="section-header center reveal">
      <div class="section-label" id="partnersLabel"></div>
      <h2 class="section-title" id="partnersTitle"></h2>
      <p class="section-desc" id="partnersDesc"></p>
    </div>
    <div class="partners-grid reveal" id="partnersGrid"></div>
  </div>
</section>

<!-- ═══════ CTA / CONTACT ═══════ -->
<section class="cta-section" id="contact">
  <div class="container">
    <div class="cta-grid">
      <div class="reveal">
        <div class="section-label" style="color: rgba(255,255,255,0.4);" id="contactLabel"></div>
        <h2 id="contactTitle"></h2>
        <p class="section-desc" id="contactDesc"></p>
        <div class="cta-info-row" id="contactInfoRow"></div>
      </div>
      <div class="cta-form-card reveal">
        <h3 id="contactFormTitle"></h3>
        <div class="form-row">
          <div class="form-group">
            <label>Имя</label>
            <input type="text" class="form-input" placeholder="Ваше имя">
          </div>
          <div class="form-group">
            <label>Телефон</label>
            <input type="tel" class="form-input" placeholder="+7 (___) ___-__-__">
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" class="form-input" placeholder="email@company.kz">
        </div>
        <div class="form-group">
          <label>Описание проекта</label>
          <textarea class="form-input" placeholder="Опишите ваш проект или задачу..."></textarea>
        </div>
        <button class="form-submit" id="formSubmitBtn">Отправить заявку</button>
      </div>
    </div>
  </div>
</section>

<!-- ═══════ FOOTER ═══════ -->
<footer class="footer">
  <div class="container">
    <div class="footer-main" id="footerMain"></div>
    <div class="footer-bottom" id="footerBottom"></div>
  </div>
</footer>


<!-- Scripts -->

<script src="js/main.js"></script>
</body>
